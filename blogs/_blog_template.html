<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title id="page-title">Blog Post</title>
    
    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:title" content="Blog Post" />
    <meta property="og:description" content="Read the latest blog post" />
    <meta property="og:url" content="https://fjfehr.github.io/content/blogs/" />
    <meta property="og:type" content="article" />
    <meta property="og:image" content="https://fjfehr.github.io/content/site/profile_picture.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .blog-container {
            max-width: var(--maxw);
            margin: var(--blog-margin-top, 40px) auto var(--blog-margin-bottom, 40px);
            padding: 0 var(--padding-horizontal, 40px);
        }

        .blog-content {
            min-width: 0;
        }

        .blog-title {
            font-size: clamp(28px, 5vw, 42px);
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .blog-date {
            color: var(--muted-color);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .blog-body {
            font-size: 17px;
            line-height: 1.7;
            color: var(--text-color);
            overflow-wrap: break-word;
            word-break: break-word;
        }

        .blog-body h2 {
            font-size: 28px;
            font-weight: 600;
            margin-top: 48px;
            margin-bottom: 16px;
            line-height: 1.3;
        }

        .blog-body h3 {
            font-size: 22px;
            font-weight: 600;
            margin-top: 36px;
            margin-bottom: 12px;
        }

        .blog-body p {
            margin-bottom: 20px;
        }

        .blog-body ul, .blog-body ol {
            margin-bottom: 20px;
            padding-left: 28px;
        }

        .blog-body ul {
            list-style-type: disc;
        }

        .blog-body ol {
            list-style-type: decimal;
        }

        .blog-body li {
            margin-bottom: 8px;
        }

        .blog-body a {
            color: var(--link-color, #0066cc);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .blog-body a:hover {
            border-bottom-color: currentColor;
        }

        .blog-body code {
            background: var(--code-bg, #f5f5f5);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9em;
        }

        .blog-body pre {
            background: var(--code-bg, #f5f5f5);
            padding: 16px;
            border-radius: 6px;
            overflow-x: auto;
            margin-bottom: 20px;
        }

        .blog-body pre code {
            background: none;
            padding: 0;
        }

        .blog-body blockquote {
            border-left: 3px solid var(--muted-color);
            padding-left: 20px;
            margin-left: 0;
            font-style: italic;
            color: var(--muted-color);
        }

        .blog-body img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 24px 0;
        }

        /* === BLOG HEADER: two-row sticky === */
        .blog-header {
            flex-direction: column;
            align-items: stretch;
            margin: 0 auto !important;
            padding-top: 10px;
            padding-bottom: 0;
            gap: 0;
            border-bottom: 1px solid var(--border-color);
        }
        .blog-header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding-bottom: 6px;
        }
        .blog-header-title {
            font-size: clamp(13px, 2vw, 16px);
            font-weight: 600;
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-color);
            text-align: center;
            padding: 0 8px;
        }
        .blog-header-controls {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .blog-toc-btn, .blog-back-link {
            text-decoration: none;
            color: var(--muted-color);
            font-size: 13px;
            white-space: nowrap;
            padding: 4px 8px;
            border-radius: 4px;
            transition: color 0.2s, background-color 0.2s;
        }
        .blog-toc-btn:hover, .blog-back-link:hover {
            color: var(--text-color);
            background-color: var(--hover-bg);
        }

        /* Section nav row: current-section breadcrumb */
        .blog-header-nav {
            display: flex;
            align-items: baseline;
            gap: 0;
            min-height: 0;
            overflow: hidden;
        }

        .blog-current-h2 {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-color);
            padding: 3px 0 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
            flex-shrink: 1;
        }

        .blog-current-h3 {
            font-size: 13px;
            font-weight: 400;
            color: var(--muted-color);
            padding: 3px 0 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
            flex-shrink: 2;
        }

        .blog-current-h3:not(:empty)::before {
            content: ' › ';
            color: var(--muted-color);
        }

        @media (max-width: 720px) {
            .blog-header-nav {
                flex-direction: column;
                gap: 0;
            }
            .blog-current-h2 {
                padding-bottom: 1px;
            }
            .blog-current-h3 {
                font-size: 11px;
                padding: 0 0 5px;
            }
            .blog-current-h3:not(:empty)::before {
                content: '';
            }
        }

        /* === INLINE TOC (auto-inserted at top of blog body) === */
        .blog-inline-toc {
            border-left: 3px solid var(--link-color);
            padding: 12px 0 12px 20px;
            margin-bottom: 36px;
        }
        .blog-inline-toc .blog-toc-heading {
            margin: 0 0 12px 0;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-color);
        }
        .blog-inline-toc ul {
            margin: 0;
            padding-left: 20px;
            list-style-type: disc;
        }
        .blog-inline-toc li { margin-bottom: 6px; }
        .blog-inline-toc a {
            color: var(--link-color);
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: color 0.2s;
        }
        .blog-inline-toc a:hover { text-decoration: underline; }

        /* Headings need scroll offset for taller sticky header */
        .blog-body h2, .blog-body h3 { scroll-margin-top: 110px; }

        @media (max-width: 720px) {
            .blog-container {
                padding: 0 20px;
            }

            .blog-title {
                font-size: 28px;
            }

            .blog-body {
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            #site-name { display: none; }
            .blog-back-link { padding: 4px; }
        }

        /* === READING PROGRESS PILL === */
        .blog-progress {
            position: fixed;
            bottom: 24px;
            right: 20px;
            background: linear-gradient(
                to right,
                var(--border-color) var(--fill, 0%),
                var(--bg-color) var(--fill, 0%)
            );
            color: var(--muted-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.3px;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.2s, background 0.15s ease-out;
            pointer-events: none;
        }
        .blog-progress.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="top"></div>
    
    <main>
        <header class="header blog-header">
            <div class="blog-header-top">
                <a href="../index.html#top" class="blog-back-link">← <span id="site-name">Home</span></a>
                <div class="blog-header-title" id="blog-header-title"></div>
                <div class="blog-header-controls">
                    <a href="#blog-inline-toc" class="blog-toc-btn" id="blog-toc-btn" aria-label="Jump to TOC">↑ TOC</a>
                    <nav class="nav-links" id="nav-links">
                        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
                    </nav>
                </div>
            </div>
            <nav class="blog-header-nav" id="blog-header-nav" aria-label="Current section">
                <!-- JS populates single current-section indicator -->
            </nav>
        </header>
        
        <div class="blog-container">
            <article class="blog-content">
                <h1 class="blog-title" id="blog-title">Loading…</h1>
                <div class="blog-date" id="blog-date">Loading…</div>
                <div class="blog-body" id="blog-body">
                    <!-- Blog content will be loaded here -->
                </div>
                
                <div style="margin-top: 48px; margin-bottom: 24px;">
                    <a href="../index.html#blog" class="back-link" style="font-size: 16px;">← Let's escape the rabbit hole 🐰🕳️</a>
                </div>
            </article>
        </div>
        
        <footer class="footer">
        <p style="margin-top: 8px; font-size: 0.9em;">&copy; <span id="footer-year">2025</span> <span id="footer-name">Loading…</span> • <a href="#" id="footer-license" target="_blank" rel="noopener noreferrer">Loading…</a></p>
    </footer>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
