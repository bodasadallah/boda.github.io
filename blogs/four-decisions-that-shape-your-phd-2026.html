    <script>
        // Auto-load this specific blog post
        window.BLOG_POST_ID = 'four-decisions-that-shape-your-phd-2026';
        
        // Embedded blog data (no need for separate JSON file!)
        window.BLOG_POST_DATA = {"title": "Four Decisions That Shape Your PhD", "short_title": "Four Decisions for PhD", "date": "2026-03-08", "reading_time": "10 min read", "content": "**TL;DR** A PhD is shaped by four decisions: **why** you are doing it, **whom** you work with, **where** you live, and **what** problem you want to solve. The order matters. Start with your purpose. Then choose your mentor and environment carefully. Finally pick a topic that excites you and realistic in your lab.\n\n## Four decisions that shape your PhD:\n\nHere are some thoughts that I believe are essential to consider. **Why**, with **Whom**, **Where**, and in **What** should I do a PhD (in that order). I know, I know, it's  strange to put the topic last but let me explain.\n\n<div style=\"display: flex; justify-content: center; margin: 4px 0;\"> <figure style=\"margin: 0; text-align: center; max-width: 480px;\"> <img src=\"images/idiap/goldencircle_phd.jpeg\" alt=\"Concentric circles\" style=\"width: 100%; border-radius: 8px; display: block;\"> <figcaption style=\"font-size: 13px; color: gray; margin-top: 6px;\">The Golden Circle of PhD Decision Making: Start with *Why* and work your way out. </figcaption> </figure> </div>\n\n### 1. Why should you do a PhD?\n\n**A PhD is not a shortcut to success.** Aiming directly for success usually backfires. As Viktor Frankl wrote \"*For success, like happiness, cannot be pursued; it must ensue, and it only does so as the unintended side-effect of one's dedication to a cause greater than oneself*\". They emerge when you dedicate yourself to something meaningful. This idea echoes [Simon Sinek’s Golden Circle](https://youtu.be/fMOlfsR7SMQ?si=B4ddiicEDsckWx5X), [Why Greatness Cannot Be Planned](https://youtu.be/lhYGXYeMq_E?si=yDhof255NzmJ2uh4&t=386), and [Ikigai](https://en.wikipedia.org/wiki/Ikigai). Ideally, you shouldn’t chase outcomes. You start with **why**. When the problem matters to you, progress and success follow. Research works the same way: focus on the idea, and the papers and PhD tend to come.\n\n**Knowing your why is essential.** Passion isn’t a nice-to-have. It’s fuel. A PhD is full of confusion, failure, impostor syndrome and late nights.  Without a clear reason, it’s very hard to keep going. That “why” becomes your anchor. For me, there were several. I wanted to learn deeply and contribute to knowledge. I wanted to build specialised technical skills that would let me work on impactful problems. But also stay financially independent, and keep my options open internationally. Switzerland also mattered. It let me reconnect with my family roots and experience a culture beyond South Africa. A PhD in machine learning in Switzerland happened to sit at the intersection of all of that.\n\n**A PhD is an exercise in focus and resilience.** Roughly four years. Around 10,000 hours. If that really is enough time to become an expert, the real question is whether you’re excited about what you're experting yourself in. Methods, models, datasets and even required skills will change. The underlying problems you care about probably won’t. The best advice I got from my MSc supervisor was simple: \"*Work on something that you like because ultimately it’s your project*\". That responsibility does not disappear in a PhD. If anything, it becomes heavier. Something my PhD supervisor said in our first meeting reinforced that idea. He was genuinely excited and said, \"*I can't guarentee it will be easy, but it will be so cool!*\". That level of enthusiasm mattered to me. It made the challenge feel worth it. That’s the kind of \"why\" I needed. Not one borrowed from metrics or prestige, but one that still holds when things get hard.\n\n<figure class=\"collab-figure\" style=\"max-width: 600px; margin: 20px auto;\">\n  <img src=\"images/idiap/HendersonInterview.png\" alt=\"Henderson interview COVID 2020\" style=\"width: 100%; border-radius: 8px; display: block;\">\n  <figcaption style=\"text-align: center; font-size: 14px; color: gray;\">Real footage of my first meeting with my supervisor Dr. James Henderson, during COVID over Zoom in 2020.</figcaption>\n</figure>\n\n### 2. With whom should you do a PhD?\n\n**Who you do your PhD with may matter more than the topic.** I see a supervision relationship as similar to a romantic one. Imagine being stuck in a romantic relationship that you do not gel with for four years... Yea.. not great. In any relationship, you need someone who has your back, trusts you, is willing to grow with you, and who you can talk to when times get hard. The same applies to a supervisor. If you trust them and their vision, the topic tends to follow naturally. I am grateful to [Jamie](https://scholar.google.com/citations?user=CSib0ooAAAAJ&hl=en) for being that person for me.\n\n**Supervisor seniority comes at the cost of attention.** More famous professors with larger groups provide less day-to-day guidance. Sometimes postdocs or senior group members are more available. If you are a maverick and enjoy figuring things out alone, a big lab with a well-known name can work. The reputation opens doors, but you have to steer your research and build collaborations yourself. If you are newer to research and still building confidence, a younger career supervisor willing to go through the trenches with you can make all the difference. Choosing the right supervision style matters as much as choosing the right person.\n\n**Routine matters** My supervisors’ group had a regular routine. I valued weekly one-to-one meetings even when there was little to discuss. They reduced procrastination, forced clarity, and offered a reality check for half-formed ideas. Weekly group meetings, where we presented papers and shared ideas, reminded me I was not alone. Those small structures for sure improved my PhD experience.\n\n\n### 3. Where should you do a PhD? \n\nWhere you do a PhD matters more than people admit. Switzerland, [EPFL](https://www.epfl.ch/about/) and [Idiap Research Institute](https://www.idiap.ch/en/) 🇨🇭 was one of the best places to do a PhD in ML and here is why.\n\n**Quality** The quality of the institution matters, but I would encourage you to take a more macro view of the region and country. Are there other universities nearby that are consistently strong in your field? That concentration creates a healthy ecosystem for knowledge sharing. In my case, Swiss universities (I was at EPFL) consistently rank near the top in technical fields. Then zoom in to the lab itself. At Idiap, it was small but big enough, with over 30 years of experience in AI (built off the back of artichoke liquor and known for work in speech processing and machine learning, including [torch](http://torch.ch/torch3/)). The institute spans robotics, biometrics, speech, vision, NLP and other applied AI areas. I’m a Swiss national, with family there, so it felt natural. Even without that connection, I think the strength of the surrounding ecosystem makes it a solid place to do a PhD. More broadly, pay attention to who surrounds you, whether there are adjacent problems, genuine interdisciplinary exchange, and nearby institutes or seminars you can learn from. Those small interactions compound over time. I like to think of it as building an intellectual neighbourhood.\n\n\n**Financial** The structure of funding matters. In Switzerland, PhD salaries are relatively high compared to the cost of living. In my case, rent was about a quarter of my income after tax. I could pay rent, eat well, ski on the weekend, and not constantly worry about money. That stability makes a difference. If you can’t afford to do a PhD, it becomes much harder to focus on the work. In computational fields like machine learning, you should also consider whether the lab has enough resources for compute and experiments. Financial security and infrastructure are not glamorous topics, but they often shape the quality of your research more than rankings do.\n\n**Lifestyle** When research gets tough, you need ways to reset. Switzerland made that easy. Mountains, nature, skiing on winter weekends, and an international community of people going through similar challenges. That helped more than I expected. Being in the centre of Europe, with a strong currency, also made it easier to explore other countries during holidays. Those small escapes matter more than they seem. \n\n**Its not all roses** I lived in a small town, Martigny, which can feel very quiet if you’re used to big cities. For my PhD, that focus was a benefit, but it’s not for everyone. It’s also intimidatingly French-speaking. If you don’t speak French (like I didn’t), it becomes a side project to learn and immerse yourself. Swiss culture can also be hard to crack, even for me, Swiss on paper, especially as a foreigner. I ended up spending most of my time with the international crowd at Idiap, and those bonds became some of the closest I made.\n  \n<div style=\"display: flex; justify-content: center; margin: 4px 0;\"> <figure style=\"margin: 0; text-align: center; max-width: 480px;\"> <img src=\"images/idiap/swiss_cow.png\" alt=\"Swiss cow with headphones doing AI research in the Alps\" style=\"width: 100%; border-radius: 8px; display: block;\"> <figcaption style=\"font-size: 13px; color: gray; margin-top: 6px;\">The Swiss PhD. World-class AI research, mountain views, solid funding and compute, and a collaborative international community. </figcaption> </figure> </div>\n\nIf you’re choosing where to do a PhD, don’t underestimate the environment. You’ll live there for years. It will shape how well you work, and how well you live.\n\n### 4. In what topic should you do a PhD?\n\n**What topic should you work on?** Start with a simple question: *does the topic genuinely matter to you?*  Before PhD, I applied broadly (jobs, tech, studies) and ended up choosing between a PhD in microbiome forensics at UniL and one in core machine learning at EPFL and Idiap. Turning down UniL was tough. It was interesting and I would likely have been the most technical person in the team. But I asked myself a harder question. At the end of four years, do I want to be the expert in this very specific application, or do I want to work on more general problems? I realised I would rather be the dumbest in the room and stretch upwards than be the local expert too early. The topic you choose will shape how you think, so it must connect to a deeper curiosity, not just a short-term opportunity.\n\n**Where is no one looking?** Research is rarely evenly distributed. The papers that get attention in conferences are the ones that \"made it back\", a bit like planes returning from battle (see below). Some areas are neglected for reasons that may be arbitrary, technical, or simply unfashionable. These gaps are often fertile. Start small, test ideas quickly to fail fast to see potential. Look at patterns in *test-of-time awards* at conferences: what stuck around, and why? Often the ideas that endure were not flashy, but solved something fundamental and scalable. This is why, as *Why Greatness Cannot Be Planned* argues, you cannot reliably predict which research will have lasting impact. Focus on curiosity, experimentation, and neglected niches.\n\n<div style=\"display: flex; justify-content: center; margin: 4px 0;\"> <figure style=\"margin: 0; text-align: center; max-width: 480px;\"> <img src=\"images/idiap/Survivorship-bias.png\" alt=\"WWII plane bullet-hole survivorship bias diagram\" style=\"width: 100%; border-radius: 8px; display: block;\"> <figcaption style=\"font-size: 13px; color: gray; margin-top: 6px;\">[The survivorship bias](https://en.wikipedia.org/wiki/Survivorship_bias): The planes that didn't make it back had holes in different places. Research works the same way. Often the important questions are where no one is publishing yet, or where the field has overlooked simpler approaches.</figcaption> </figure> </div>\n\n**Can this topic be done at this lab?** Be pragmatic about whether you can actually research the topic well. Some areas in machine learning demand enormous compute and specific data. If you cannot realistically train models or run competitive experiments, you will constantly feel behind. Resources matter. So do communities. What does this lab and your supervisor actually excel in, and are there people around you working on adjacent problems? Those strengths shape the conversations you can have and the ideas you can grow. Are there conferences and journals that publish consistently in this space? Are there people around you with experience who can guide you? A topic may be exciting in theory, but if you cannot test ideas properly, it will become frustrating. Feasibility is not glamorous, but it is foundational. Think strategically: the neglected areas you are curious about may be fertile, but you need a base that allows you to explore them without fighting physics or infrastructure. Simple, usable tools and early experiments often become the engine of bigger discoveries.\n\n<div style=\"display: flex; justify-content: center; margin: 4px 0;\"> <figure style=\"margin: 0; text-align: center; max-width: 480px;\"> <img src=\"images/idiap/bitter_lesson_meme.png\" alt=\"Rich Sutton's Bitter Lesson meme about computation winning in the long run\" style=\"width: 100%; border-radius: 8px; display: block;\"> <figcaption style=\"font-size: 13px; color: gray; margin-top: 6px;\">Rich Sutton's [Bitter Lesson](http://www.incompleteideas.net/IncIdeas/BitterLesson.html): Scale computation beats model-building and inductive bias. The computational steamroller is coming, don't fight against it.</figcaption> </figure> </div>\n\n**Where to next?** Finally, think about where this leaves you after four years. The world will change. In 2021 it was embeddings, 2023 was diffusion, and shortly after large language models, now in 2025–2026 it is all about agents. The fast fashion of AI moves quickly. If you chase the hottest topic, you risk being outpaced by large labs with deeper pockets. If you choose something too narrow, you risk being boxed in. The balance is to stay general in the problems you care about, but niche and technical enough to build depth without being crushed by competition. Remember, you are making a four-year bet on yourself. Choose a problem that will still make sense when the trend cycle moves on."};
